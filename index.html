<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>全自動ブログ収益エンジン</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');

:root {
  --bg: #060609;
  --s1: #0e0e18;
  --s2: #14141f;
  --border: rgba(255,255,255,0.06);
  --green: #39ff8f;
  --blue: #4da6ff;
  --orange: #ff7043;
  --text: #ddd8ee;
  --muted: #555;
  --mono: 'DM Mono', monospace;
  --sans: 'Zen Kaku Gothic New', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:80px}
